# This role expects configure-aap-api to have run first (same play or earlier).
# It uses aap_controller_url, aap_api_token, and assumes credentials, inventory,
# project, and execution environment exist in AAP. No dependency is declared so
# the playbook can list both roles explicitly: configure-aap-api, then seeding-cutover-migration.
# Creates two job templates: "VM Seeding (Incremental Sync)" and "VM Cutover (Final Cutover)".
# The workflow (Seeding → Approval → Cutover) must be created manually in AAP UI.
